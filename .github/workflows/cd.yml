# ==============================================
# CD Pipeline — Deploy + Health Check
# Branch: feature/deploy-workflow-improve
# Lead DevOps — Tugas 11, Modul 11
# ==============================================
#
# Workflow ini berjalan otomatis saat push ke main (setelah CI pass).
#
# Jobs:
#   deploy-backend   : Deploy backend ke Railway/Render
#   deploy-frontend  : Deploy frontend ke Railway/Render
#   health-check     : Panggil /health endpoint, gagal jika tidak healthy
#   notify-deploy    : Ringkasan deployment sebagai PR comment / output

name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:           # Bisa dijalankan manual dari GitHub UI

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false    # Jangan cancel deploy yang sedang berjalan

jobs:

  # ================================================================
  # JOB 1: Deploy Backend
  # Sesuaikan dengan platform yang digunakan (Railway / Render)
  # ================================================================
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      backend_url: ${{ steps.set-url.outputs.url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Jika pakai Railway ──────────────────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service backend --detach
          echo "✅ Backend deployed"

      # Set URL output untuk dipakai job berikutnya
      - name: Set backend URL
        id: set-url
        run: echo "url=backendcc-kelompok-cccclan-production.up.railway.app" >> $GITHUB_OUTPUT


  # ================================================================
  # JOB 2: Deploy Frontend
  # ================================================================
  deploy-frontend:
    name: 🚀 Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      frontend_url: ${{ steps.set-url.outputs.url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service frontend --detach
          echo "✅ Frontend deployed"

      - name: Set frontend URL
        id: set-url
        run: echo "url=frontendcc-kelompok-cccclan-production.up.railway.app" >> $GITHUB_OUTPUT


  # ================================================================
  # JOB 3: Health Check — wajib pass setelah deploy
  #
  # - Panggil GET /health setelah deploy backend selesai
  # - Retry hingga 5x dengan jeda 15 detik (tunggu app ready)
  # - Verifikasi response: status 200 + body {"status":"ok"}
  # - Jika gagal setelah semua retry → workflow GAGAL
  # ================================================================
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for services to be ready
        run: sleep 20   # Beri waktu Railway restart service

      - name: Check Backend Health
        env:
          BACKEND_URL: ${{ needs.deploy-backend.outputs.backend_url }}
        run: |
          echo ">>> Memeriksa health backend: $BACKEND_URL/health"

          MAX_RETRY=5
          DELAY=15
          ATTEMPT=0

          until [ $ATTEMPT -ge $MAX_RETRY ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "--- Percobaan $ATTEMPT dari $MAX_RETRY..."

            HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              --max-time 10 \
              "$BACKEND_URL/health" || echo "000")

            echo "    HTTP Status : $HTTP_STATUS"
            echo "    Response    : $(cat /tmp/health_response.json)"

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "    ❌ Status bukan 200, coba lagi dalam ${DELAY}s..."
              sleep $DELAY
              continue
            fi

            HEALTH_STATUS=$(cat /tmp/health_response.json | python3 -c \
              "import sys, json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")

            if [ "$HEALTH_STATUS" != "ok" ]; then
              echo "    ❌ Response status bukan 'ok' (dapat: '$HEALTH_STATUS'), coba lagi..."
              sleep $DELAY
              continue
            fi

            echo "    ✅ Backend sehat! status=$HEALTH_STATUS"
            exit 0
          done

          echo ""
          echo "❌❌❌ HEALTH CHECK GAGAL setelah $MAX_RETRY percobaan!"
          echo "    URL    : $BACKEND_URL/health"
          echo "    Status : $HTTP_STATUS"
          echo "    Body   : $(cat /tmp/health_response.json)"
          echo ""
          echo "⚠️  Lihat deployment guide untuk instruksi rollback manual:"
          echo "    docs/deployment-guide.md#rollback"
          exit 1

      - name: Check Frontend Reachable
        env:
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.frontend_url }}
        run: |
          echo ">>> Memeriksa frontend: $FRONTEND_URL"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$FRONTEND_URL" || echo "000")

          echo "    HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "301" ] && [ "$HTTP_STATUS" != "302" ]; then
            echo "❌ Frontend tidak dapat diakses (status: $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Frontend dapat diakses!"

      - name: Health check summary
        run: |
          echo ""
          echo "============================================"
          echo "  ✅ SEMUA HEALTH CHECK BERHASIL"
          echo "  Backend  : ${{ needs.deploy-backend.outputs.backend_url }}"
          echo "  Frontend : ${{ needs.deploy-frontend.outputs.frontend_url }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "============================================"


  # ================================================================
  # JOB 4: Notify — Ringkasan deployment sebagai output log
  # ================================================================
  notify-deploy:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-backend, deploy-frontend, health-check]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          BACKEND_RESULT="${{ needs.deploy-backend.result }}"
          FRONTEND_RESULT="${{ needs.deploy-frontend.result }}"
          HEALTH_RESULT="${{ needs.health-check.result }}"

          icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           DEPLOYMENT SUMMARY — CD Pipeline           ║"
          echo "╠══════════════════════════════════════════════════════╣"
          printf "║  %-20s : %-30s║\n" "Deploy Backend" "$(icon $BACKEND_RESULT) $BACKEND_RESULT"
          printf "║  %-20s : %-30s║\n" "Deploy Frontend" "$(icon $FRONTEND_RESULT) $FRONTEND_RESULT"
          printf "║  %-20s : %-30s║\n" "Health Check" "$(icon $HEALTH_RESULT) $HEALTH_RESULT"
          echo "╠══════════════════════════════════════════════════════╣"
          printf "║  %-20s : %-30s║\n" "Commit SHA" "${{ github.sha }}"
          printf "║  %-20s : %-30s║\n" "Triggered by" "@${{ github.actor }}"
          printf "║  %-20s : %-30s║\n" "Timestamp" "$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "╠══════════════════════════════════════════════════════╣"
          printf "║  %-20s : %-30s║\n" "Backend URL" "${{ needs.deploy-backend.outputs.backend_url }}"
          printf "║  %-20s : %-30s║\n" "Frontend URL" "${{ needs.deploy-frontend.outputs.frontend_url }}"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""

          if [[ "$HEALTH_RESULT" == "failure" ]]; then
            echo "⚠️  Health check gagal! Ikuti instruksi rollback di:"
            echo "   docs/deployment-guide.md#rollback-manual"
            exit 1
          fi