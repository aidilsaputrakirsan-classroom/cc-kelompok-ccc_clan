name: CD — Deploy ke DeployCC

on:
  workflow_run:
    workflows:
      - CI Pipeline
    types:
      - completed

  workflow_dispatch:
    inputs:
      mode:
        description: Deploy mode
        required: false
        default: full
        type: choice
        options:
          - full

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Debug Workflow Trigger
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Workflow Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies frontend
        working-directory: frontend
        run: npm ci

      - name: Build React (production)
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Buat ZIP untuk deploy
        run: |
          zip -r deploy.zip . \
            -x "frontend/node_modules/*" \
            -x "frontend/.next/*" \
            -x "frontend/dist/*" \
            -x "frontend/build/*" \
            -x "backend/venv/*" \
            -x "backend/__pycache__/*" \
            -x "backend/*.pyc" \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.zip"

          echo "Ukuran ZIP:"
          du -sh deploy.zip

      - name: Deploy ke server
        run: |
          RESPONSE=$(curl -sS --max-time 300 \
            -X POST "${{ secrets.DEPLOY_URL }}" \
            -F "key=${{ secrets.DEPLOY_KEY }}" \
            -F "repo=${{ secrets.DEPLOY_REPO }}" \
            -F "mode=full" \
            -F "file=@deploy.zip" \
            -A "GitHub-Actions/deploycc" \
            -w "\n---HTTP_CODE:%{http_code}")

          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')

          echo "===================================="
          echo "HTTP Status : $HTTP_CODE"
          echo "===================================="
          echo "$BODY"
          echo "===================================="

          if [ -z "$HTTP_CODE" ]; then
            echo "❌ Tidak dapat membaca HTTP status"
            exit 1
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy gagal (HTTP $HTTP_CODE)"
            exit 1
          fi

          if echo "$BODY" | grep -q "DEPLOYCC_ERROR"; then
            echo "❌ Deploy gagal menurut server"
            exit 1
          fi

          echo "✅ Deploy berhasil"

      - name: Ringkasan deploy
        if: success()
        run: |
          {
            echo "## ✅ Deploy Berhasil"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Repo | \`${{ secrets.DEPLOY_REPO }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Waktu | $(date +'%Y-%m-%d %H:%M:%S UTC') |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Ringkasan gagal
        if: failure()
        run: |
          {
            echo "## ❌ Deploy Gagal"
            echo ""
            echo "Periksa step **Deploy ke server** untuk detail error."
            echo ""
            echo "### Checklist"
            echo "- DEPLOY_URL sudah benar"
            echo "- DEPLOY_KEY sudah benar"
            echo "- DEPLOY_REPO sudah benar"
            echo "- Server DeployCC aktif"
            echo "- Endpoint menerima upload ZIP"
          } >> $GITHUB_STEP_SUMMARY