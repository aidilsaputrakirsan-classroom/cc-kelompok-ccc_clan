name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v || true

  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 15

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:${{ github.sha }} ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:latest ./backend

      - name: Build frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:${{ github.sha }} ./frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:latest ./frontend

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:latest

      - name: Show Image Sizes
        run: |
          echo "=== Docker Image Sizes ==="
          docker images | grep sipilih