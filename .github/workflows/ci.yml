name: CI Pipeline

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: sqlite:///./test.db
      PYTHONPATH: ./backend

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reset DB
        run: rm -f test.db

      - name: Run Tests
        run: |
          if find . -type f -name "test_*.py" | grep -q .; then
            pytest -v
          else
            echo "No tests found, skipping backend tests"
          fi

  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs:
      - test-backend
      - test-frontend

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker
        if: env.DOCKER_PASSWORD != ''
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            bentosaputra/sipilih-backend:${{ github.sha }}
            bentosaputra/sipilih-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Docker
        if: env.DOCKER_PASSWORD != ''
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            bentosaputra/sipilih-frontend:${{ github.sha }}
            bentosaputra/sipilih-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Docker Only
        if: env.DOCKER_PASSWORD == ''
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: bentosaputra/sipilih-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Only
        if: env.DOCKER_PASSWORD == ''
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: bentosaputra/sipilih-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: 💬 Notify PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pull-requests: write
      contents: read
      issues: write

    needs:
      - test-backend
      - test-frontend

    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Build status summary
        id: summary
        run: |
          BACKEND="${{ needs.test-backend.result }}"
          FRONTEND="${{ needs.test-frontend.result }}"

          icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          B=$(icon "$BACKEND")
          F=$(icon "$FRONTEND")

          if [[ "$BACKEND" == "success" && "$FRONTEND" == "success" ]]; then
            OVERALL="✅ **CI PASSED** — Backend dan frontend berhasil."
          else
            OVERALL="❌ **CI FAILED** — Ada tahap yang gagal."
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          cat >> "$GITHUB_OUTPUT" <<END_OUTPUT
          body<<$EOF
          ## 🤖 CI Pipeline Report

          $OVERALL

          | Job | Status |
          |-----|--------|
          | 🐍 Test Backend | $B \`$BACKEND\` |
          | ⚛️ Test Frontend | $F \`$FRONTEND\` |

          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** @${{ github.actor }}
          **Workflow run:** [Lihat detail](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          *Komentar ini dibuat otomatis oleh CI pipeline.*
          $EOF
          END_OUTPUT

      - name: Find existing CI comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "🤖 CI Pipeline Report"

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace