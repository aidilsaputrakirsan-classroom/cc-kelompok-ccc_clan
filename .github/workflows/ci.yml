name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ================================
# Prevent duplicate runs
# ================================
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: sqlite:///./test.db
      PYTHONPATH: .

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Reset DB
        run: rm -f test.db

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=50

  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build

  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:${{ github.sha }} ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:latest ./backend

      - name: Build frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:${{ github.sha }} ./frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:latest ./frontend

      # Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push Images (hanya saat push ke main)
      - name: Push Images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sipilih-frontend:latest

      # Dokumentasi Image Size
      - name: Show Image Sizes
        run: |
          echo "=== Docker Image Sizes ==="
          docker images | grep sipilih

  notify-failure:
    name: 📢 Notify Failure
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: failure() && github.event_name == 'pull_request'
    timeout-minutes: 10

    permissions:
      pull-requests: write

    steps:
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ❌ CI Pipeline Failed!
            Cek log Actions untuk detail error.